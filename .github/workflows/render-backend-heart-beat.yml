name: Render backend Keep Alive/Heart Beat

on:
  schedule:
    # Runs every 14 minutes to prevent Render free tier from sleeping (15m limit)
    - cron: '*/14 * * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render Backend
        run: |
          curl -I https://sapti-ai.onrender.com/
          echo "Keep-alive/Heart-beat ping sent to Sapti AI Backend"
